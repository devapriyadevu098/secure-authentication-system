{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card p-4">

            <h2 class="text-center mb-4">
                Welcome {{ user.username }}
            </h2>

            <table class="table">

                <tr>
                    <th>ID</th>
                    <td>{{ user.id }}</td>
                </tr>

                <tr>
                    <th>Username</th>
                    <td>{{ user.username }}</td>
                </tr>

                <tr>
                    <th>Email</th>
                    <td>{{ user.email }}</td>
                </tr>

                <tr>
                    <th>Created</th>
                    <td>{{ user.created_at }}</td>
                </tr>

            </table>

            <a href="/logout" class="btn btn-danger">
                Logout
            </a>

        </div>

    </div>

</div>

{% endblock %}
